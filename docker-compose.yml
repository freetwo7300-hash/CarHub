  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U carhubuser -d carhub"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - carhub-network

  # Optional: Redis Cache (Future Use)
  # Uncomment when caching layer is needed
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
