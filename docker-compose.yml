version: '3.8'

services:
  # Main CarHub Application
  carhub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=CarHub
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # Optional: mount source for hot reload during development
      # Uncomment below for development
      # - .:/app
      # - /app/node_modules
      # - /app/.next
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - carhub-network
    labels:
      - "com.example.description=CarHub Application"

  # Optional: Reverse proxy (Nginx)
  # Uncomment to use with nginx configuration
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - carhub
  #   restart: unless-stopped
  #   networks:
  #     - carhub-network

  # Optional: PostgreSQL Database (Future Use)
  # Uncomment when API backend is implemented
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: carhubuser
