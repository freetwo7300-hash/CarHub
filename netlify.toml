[build]
command = "pnpm build"
publish = ".next"

[build.environment]
NODE_VERSION = "24"
PNPM_VERSION = "10"

# Netlify Next.js plugin for proper server-side rendering support
[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/public/*"
[headers.values]
Cache-Control = "public, max-age=86400"
