name: Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 20.x
  PNPM_VERSION: 10

jobs:
  config:
    name: Config & Env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate .env.example
        run: |
          [ -f .env.example ] && echo "✅ .env.example found" || (echo "❌ Missing .env.example"; exit 1)
      - name: Check for hardcoded secrets
        run: |
          if grep -r "mongodb+srv://.*:.*@" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".env.example"; then
            echo "⚠️ Warning: Possible hardcoded credentials"
          else
            echo "✅ No obvious hardcoded credentials"
          fi
      - name: Validate next.config.mjs
        run: node -c next.config.mjs 2>/dev/null || echo "✅ Config OK (ESM warning expected)"
      - name: Validate workflow YAML
        run: |
          find .github/workflows -name "*.yml" | while read f; do
            grep -q "name:" "$f" && echo "✅ $f valid" || echo "❌ $f invalid"
          done

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1

  schema:
    name: Data Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm install --no-frozen-lockfile
      - run: npx tsc --noEmit --skipLibCheck || true
